# Projeto Glamour Botânica
sonar.projectKey=glamour-botanica
sonar.projectName=Glamour Botânica - Skincare Natural
sonar.projectVersion=2.0.0
sonar.projectDescription=E-commerce de skincare natural e orgânico

# Código fonte
sonar.sources=.
sonar.inclusions=**/*.html,**/*.js,**/*.css
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.min.*,**/docker/**

# Análise de segurança
sonar.security.regexp.timeout=5000
sonar.html.file.suffixes=.html,.htm
sonar.css.file.suffixes=.css

# Encoding
sonar.sourceEncoding=UTF-8
