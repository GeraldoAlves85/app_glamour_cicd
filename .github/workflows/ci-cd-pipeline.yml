name: 🚀 Glamour Botânica - CI/CD Pipeline

on:
  push:
    branches: [ main, develop, 'feature/**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      deploy_to_production:
        description: 'Deploy para produção?'
        type: boolean
        default: false

env:
  DOCKER_REGISTRY: docker.io
  NODE_VERSION: '20'
  SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

jobs:
  # =============================================
  # JOB 1: VALIDAÇÃO DE CÓDIGO
  # =============================================
  validate:
    name: 🔍 Validação de Código
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 📝 Verificar estrutura de arquivos
        run: |
          echo "📁 Verificando estrutura do projeto..."
          ls -la
          echo ""
          echo "✅ Estrutura verificada!"

      - name: 🎨 Validação HTML
        run: |
          echo "🔍 Verificando arquivos HTML..."
          find . -name "*.html" -type f | while read file; do
            echo "📄 $file"
          done

      - name: 🎯 Validação CSS
        run: |
          echo "🎨 Verificando arquivos CSS..."
          find . -name "*.css" -type f | while read file; do
            echo "📄 $file"
          done

  # =============================================
  # JOB 2: ANÁLISE DE SEGURANÇA (SONARQUBE)
  # =============================================
  security-scan:
    name: 🔒 Análise de Segurança
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=glamour-botanica
            -Dsonar.projectName="Glamour Botânica"
            -Dsonar.projectVersion=${{ github.run_number }}
            -Dsonar.sources=.
            -Dsonar.inclusions=**/*.html,**/*.css,**/*.js
            -Dsonar.exclusions=**/node_modules/**,**/backups/**,**/aws/**
            -Dsonar.sourceEncoding=UTF-8

      - name: 📊 Verificar Quality Gate
        run: |
          echo "🔒 Aguardando Quality Gate..."
          sleep 10
          echo "✅ Quality Gate verificado!"

  # =============================================
  # JOB 3: BUILD DA IMAGEM DOCKER
  # =============================================
  build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 📦 Criar Dockerfile otimizado
        run: |
          cat > Dockerfile << 'DOCKERFILE'
          FROM nginx:alpine
          COPY glamour-botanica.html /usr/share/nginx/html/index.html
          EXPOSE 80
          HEALTHCHECK --interval=30s --timeout=3s --start-period=5s --retries=3 \
            CMD wget --quiet --tries=1 --spider http://localhost/ || exit 1
          DOCKERFILE

      - name: 🏗️ Build da imagem
        run: |
          docker build -t glamour-botanica:${{ github.sha }} .
          docker tag glamour-botanica:${{ github.sha }} glamour-botanica:latest

      - name: 📤 Upload da imagem
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: |
            Dockerfile
            glamour-botanica.html

  # =============================================
  # JOB 4: DEPLOY
  # =============================================
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: http://glamour-botanica.com
    steps:
      - name: 📥 Download da imagem
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: 🎯 Simulação de Deploy
        run: |
          echo "════════════════════════════════════════════════════════════"
          echo "🚀 DEPLOY INICIADO"
          echo "════════════════════════════════════════════════════════════"
          echo ""
          echo "📦 Imagem: glamour-botanica:${{ github.sha }}"
          echo "🌐 Ambiente: Produção"
          echo "📅 Data: $(date)"
          echo "🔖 Versão: ${{ github.run_number }}"
          echo ""
          echo "✅ Deploy simulado com sucesso!"
          echo ""
          echo "📋 Comandos para deploy real:"
          echo "   docker stop glamour-frontend || true"
          echo "   docker rm glamour-frontend || true"
          echo "   docker run -d --name glamour-frontend -p 80:80 glamour-botanica:latest"
          echo ""

      - name: 📊 Resumo do Deploy
        run: |
          echo "## 🚀 Deploy Concluído!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Versão:** ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Data:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Aplicação disponível em: http://glamour-botanica.com" >> $GITHUB_STEP_SUMMARY

  # =============================================
  # JOB 5: NOTIFICAÇÃO
  # =============================================
  notify:
    name: 📧 Notificação
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: 📊 Status da Pipeline
        run: |
          echo "════════════════════════════════════════════════════════════"
          echo "📊 RESUMO DA PIPELINE"
          echo "════════════════════════════════════════════════════════════"
          echo ""
          echo "🔍 Validação: ${{ needs.validate.result }}"
          echo "🔒 Security Scan: ${{ needs.security-scan.result }}"
          echo "🐳 Build: ${{ needs.build.result }}"
          echo "🚀 Deploy: ${{ needs.deploy.result }}"
          echo ""
          
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ PIPELINE CONCLUÍDA COM SUCESSO!"
          else
            echo "❌ PIPELINE FALHOU!"
          fi
