name: Deploy to Docker Hub

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  SONAR_ORG: geraldoalves85
  SONAR_PROJECT_KEY: geraldoalves85_app_glamour_cicd
  DOCKER_USERNAME: geraldoti2022
  DOCKER_IMAGE: geraldoti2022/glamour-botanica

jobs:
  # =============================================
  # SONARCLOUD
  # =============================================
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ env.SONAR_ORG }}
            -Dsonar.sources=.

  # =============================================
  # DOCKER BUILD & PUSH
  # =============================================
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: sonarcloud
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Dockerfile
        run: |
          cat > Dockerfile << 'DOCKERFILE'
          FROM nginx:alpine
          LABEL maintainer="geraldoti2022"
          LABEL description="Glamour Botanica - Salão de Beleza"
          COPY glamour-botanica.html /usr/share/nginx/html/index.html
          EXPOSE 80
          DOCKERFILE

      - name: Build Docker image
        run: |
          VERSION="v1.0.${{ github.run_number }}"
          echo "Building version: $VERSION"
          docker build -t ${{ env.DOCKER_IMAGE }}:$VERSION .
          docker tag ${{ env.DOCKER_IMAGE }}:$VERSION ${{ env.DOCKER_IMAGE }}:latest
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push to Docker Hub
        run: |
          docker push ${{ env.DOCKER_IMAGE }}:$VERSION
          docker push ${{ env.DOCKER_IMAGE }}:latest
          echo ""
          echo "=========================================="
          echo "DEPLOY COMPLETED SUCCESSFULLY"
          echo "=========================================="
          echo "Image: ${{ env.DOCKER_IMAGE }}:$VERSION"
          echo "Image: ${{ env.DOCKER_IMAGE }}:latest"
          echo ""
          echo "Pull command:"
          echo "  docker pull ${{ env.DOCKER_IMAGE }}:latest"
          echo ""
          echo "Run command:"
          echo "  docker run -d -p 80:80 ${{ env.DOCKER_IMAGE }}:latest"
          echo "=========================================="
