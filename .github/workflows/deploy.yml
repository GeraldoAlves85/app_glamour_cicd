name: Deploy to Docker Hub

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  SONAR_ORG: geraldoalves85
  SONAR_PROJECT_KEY: geraldoalves85_app_glamour_cicd
  DOCKER_USERNAME: geraldoti2022
  DOCKER_IMAGE: geraldoti2022/glamour-botanica

jobs:
  # =============================================
  # BUILD
  # =============================================
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate version
        id: version
        run: |
          VERSION="v1.0.${{ github.run_number }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Validate files
        run: |
          if [ -f "glamour-botanica.html" ]; then
            echo "[OK] HTML file found"
          else
            echo "[ERROR] HTML file missing"
            exit 1
          fi

  # =============================================
  # SONARCLOUD
  # =============================================
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ env.SONAR_ORG }}
            -Dsonar.sources=.

  # =============================================
  # DOCKER BUILD & PUSH
  # =============================================
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: sonarcloud
    if: success()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Dockerfile
        run: |
          cat > Dockerfile << 'DOCKERFILE'
          FROM nginx:alpine
          LABEL maintainer="geraldoti2022"
          LABEL description="Glamour Botanica - Salão de Beleza"
          COPY glamour-botanica.html /usr/share/nginx/html/index.html
          RUN echo 'server { listen 80; location / { root /usr/share/nginx/html; index index.html; } location /health { return 200 "OK"; } }' > /etc/nginx/conf.d/default.conf
          EXPOSE 80
          DOCKERFILE

      - name: Build image
        run: |
          docker build -t ${{ env.DOCKER_IMAGE }}:${{ needs.build.outputs.version }} .
          docker tag ${{ env.DOCKER_IMAGE }}:${{ needs.build.outputs.version }} ${{ env.DOCKER_IMAGE }}:latest

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push to Docker Hub
        run: |
          docker push ${{ env.DOCKER_IMAGE }}:${{ needs.build.outputs.version }}
          docker push ${{ env.DOCKER_IMAGE }}:latest
          echo ""
          echo "=========================================="
          echo "DEPLOY COMPLETED"
          echo "=========================================="
          echo "Image: ${{ env.DOCKER_IMAGE }}:${{ needs.build.outputs.version }}"
          echo "Image: ${{ env.DOCKER_IMAGE }}:latest"
          echo ""
          echo "Pull command:"
          echo "  docker pull ${{ env.DOCKER_IMAGE }}:latest"
          echo ""
          echo "Run command:"
          echo "  docker run -d -p 80:80 ${{ env.DOCKER_IMAGE }}:latest"
          echo "=========================================="
