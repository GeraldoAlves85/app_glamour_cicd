name: 🚀 CI/CD Glamour Botânica

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]
  workflow_dispatch:
    inputs:
      deploy_to_production:
        description: 'Deploy para produção?'
        type: boolean
        default: false

env:
  NODE_VERSION: '20'
  DOCKER_REGISTRY: docker.io
  SONAR_ORG: geraldalves85
  SONAR_PROJECT_KEY: GeraldoAlves85_app_glamour_cicd

jobs:
  # =============================================
  # JOB 1: CHECKOUT E VALIDAÇÃO INICIAL
  # =============================================
  validate:
    name: 🔍 Validação Inicial
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.vars.outputs.sha }}
      commit_message: ${{ steps.vars.outputs.message }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📊 Informações do Commit
        id: vars
        run: |
          echo "sha=${GITHUB_SHA}" >> $GITHUB_OUTPUT
          echo "message=$(git log -1 --pretty=%B)" >> $GITHUB_OUTPUT
          echo "📝 Commit: ${GITHUB_SHA}"
          echo "💬 Mensagem: $(git log -1 --pretty=%B)"

      - name: 📁 Estrutura do Projeto
        run: |
          echo "📂 Estrutura:"
          ls -la
          echo ""
          echo "📄 Arquivos HTML:"
          find . -name "*.html" -type f
          echo ""
          echo "📄 Arquivos CSS:"
          find . -name "*.css" -type f

      - name: ✅ Validação HTML
        run: |
          if [ -f "glamour-botanica.html" ]; then
            echo "✅ Arquivo principal encontrado!"
            echo "📏 Tamanho: $(wc -c < glamour-botanica.html) bytes"
            echo "📏 Linhas: $(wc -l < glamour-botanica.html)"
          else
            echo "⚠️ Arquivo glamour-botanica.html não encontrado"
          fi

  # =============================================
  # JOB 2: SONARCLOUD ANALYSIS
  # =============================================
  sonarcloud:
    name: 🔒 SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ Setup Java (necessário para SonarScanner)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🔍 SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ env.SONAR_ORG }}
            -Dsonar.projectName="Glamour Botânica"
            -Dsonar.projectVersion=${{ github.run_number }}
            -Dsonar.sources=.
            -Dsonar.inclusions=**/*.html,**/*.css,**/*.js,**/*.ts
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/backups/**,**/aws/**,**/*.min.*
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.html.file.suffixes=.html,.htm
            -Dsonar.css.file.suffixes=.css

      - name: 📊 Aguardar Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          scanMetadataReportFile: .scannerwork/report-task.txt

  # =============================================
  # JOB 3: BUILD DOCKER IMAGE
  # =============================================
  build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: sonarcloud
    if: |
      always() &&
      (needs.sonarcloud.result == 'success' || needs.sonarcloud.result == 'skipped')
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 📦 Criar Dockerfile
        run: |
          cat > Dockerfile << 'DOCKERFILE'
          FROM nginx:alpine
          
          # Metadados
          LABEL maintainer="Geraldo Alves"
          LABEL version="${{ github.run_number }}"
          LABEL description="Glamour Botânica - Salão de Beleza & Spa"
          
          # Copiar arquivos
          COPY glamour-botanica.html /usr/share/nginx/html/index.html
          
          # Configuração do Nginx
          RUN echo 'server { \
              listen 80; \
              server_name localhost; \
              location / { \
                  root /usr/share/nginx/html; \
                  index index.html; \
                  try_files $uri $uri/ /index.html; \
              } \
              location /health { \
                  return 200 "healthy\n"; \
                  add_header Content-Type text/plain; \
              } \
          }' > /etc/nginx/conf.d/default.conf
          
          EXPOSE 80
          
          HEALTHCHECK --interval=30s --timeout=3s --start-period=5s --retries=3 \
              CMD wget --quiet --tries=1 --spider http://localhost/health || exit 1
          DOCKERFILE
          
          echo "✅ Dockerfile criado!"

      - name: 🏗️ Build da imagem
        run: |
          docker build -t glamour-botanica:${{ github.sha }} .
          docker tag glamour-botanica:${{ github.sha }} glamour-botanica:latest
          echo "✅ Imagem construída!"

      - name: 🧪 Testar imagem
        run: |
          docker run -d --name test-container -p 8080:80 glamour-botanica:latest
          sleep 3
          if curl -s http://localhost:8080 | grep -q "GLAMOUR"; then
            echo "✅ Container respondendo corretamente!"
          else
            echo "❌ Container não respondeu"
            docker logs test-container
            exit 1
          fi
          docker stop test-container
          docker rm test-container

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: |
            Dockerfile
            glamour-botanica.html
          retention-days: 7

  # =============================================
  # JOB 4: DEPLOY (SIMULAÇÃO)
  # =============================================
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: build
    if: |
      always() &&
      needs.build.result == 'success' &&
      (github.ref == 'refs/heads/main' || github.event.inputs.deploy_to_production == 'true')
    environment:
      name: production
      url: https://glamour-botanica.vercel.app
    steps:
      - name: 📥 Download artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: 🚀 Simular Deploy
        run: |
          echo "════════════════════════════════════════════════════════════"
          echo "🚀 DEPLOY EM PRODUÇÃO"
          echo "════════════════════════════════════════════════════════════"
          echo ""
          echo "📦 Imagem: glamour-botanica:${{ github.sha }}"
          echo "🌐 Ambiente: Produção"
          echo "📅 Data: $(date)"
          echo "🔖 Versão: ${{ github.run_number }}"
          echo ""
          echo "✅ Deploy simulado com sucesso!"
          echo ""
          echo "📋 Comandos para deploy real:"
          echo "   docker run -d --name glamour-prod -p 80:80 glamour-botanica:latest"

      - name: 📊 Deploy Summary
        run: |
          echo "## 🚀 Deploy Concluído!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Versão** | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Data** | $(date) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Aplicação disponível para deploy!" >> $GITHUB_STEP_SUMMARY

  # =============================================
  # JOB 5: NOTIFICAÇÃO FINAL
  # =============================================
  notify:
    name: 📧 Notificação
    runs-on: ubuntu-latest
    needs: [validate, sonarcloud, build, deploy]
    if: always()
    steps:
      - name: 📊 Status Final
        run: |
          echo "════════════════════════════════════════════════════════════"
          echo "📊 RESUMO FINAL DO CI/CD"
          echo "════════════════════════════════════════════════════════════"
          echo ""
          echo "🔍 Validação:    ${{ needs.validate.result }}"
          echo "🔒 SonarCloud:   ${{ needs.sonarcloud.result }}"
          echo "🐳 Build:        ${{ needs.build.result }}"
          echo "🚀 Deploy:       ${{ needs.deploy.result }}"
          echo ""
          
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅✅✅ PIPELINE CONCLUÍDA COM SUCESSO! ✅✅✅"
          else
            echo "❌❌❌ PIPELINE FALHOU! ❌❌❌"
          fi
          
      - name: 📝 Gerar Summary
        run: |
          echo "## 📊 Pipeline Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Validate | ${{ needs.validate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SonarCloud | ${{ needs.sonarcloud.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[🔗 Ver no SonarCloud](https://sonarcloud.io/project/overview?id=${{ env.SONAR_PROJECT_KEY }})" >> $GITHUB_STEP_SUMMARY
