# =============================================
# GLAMOUR E-COMMERCE - CI/CD PIPELINE
# =============================================
# Pipeline de Integração e Entrega Contínua
# Inclui: Testes, Análise SonarQube, Build e Deploy
# =============================================

name: CI/CD Pipeline

# =============================================
# TRIGGERS
# =============================================
on:
  push:
    branches: [ main, develop, 'feature/**' ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches: [ main, develop ]
    types: [ opened, synchronize, reopened ]

# =============================================
# ENVIRONMENT VARIABLES
# =============================================
env:
  NODE_VERSION: '20'
  DOCKER_REGISTRY: 'docker.io'
  DOCKER_IMAGE_PREFIX: 'glamour'
  SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL || 'http://localhost:9000' }}

# =============================================
# JOBS
# =============================================
jobs:
  # =============================================
  # JOB 1: DETECT CHANGES
  # =============================================
  detect-changes:
    name: 🔍 Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      catalog_changed: ${{ steps.filter.outputs.catalog }}
      cart_changed: ${{ steps.filter.outputs.cart }}
      auth_changed: ${{ steps.filter.outputs.auth }}
      payment_changed: ${{ steps.filter.outputs.payment }}
      frontend_changed: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Check for changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            catalog:
              - 'packages/services/catalog-ms/**'
              - 'packages/shared/**'
            cart:
              - 'packages/services/cart-ms/**'
              - 'packages/shared/**'
            auth:
              - 'packages/services/auth-ms/**'
              - 'packages/shared/**'
            payment:
              - 'packages/services/payment-ms/**'
              - 'packages/shared/**'
            frontend:
              - 'packages/frontend/**'
              - 'packages/shared/**'

  # =============================================
  # JOB 2: LINT & FORMAT CHECK
  # =============================================
  lint:
    name: 📝 Lint & Format
    runs-on: ubuntu-latest
    needs: [ detect-changes ]
    if: |
      needs.detect-changes.outputs.catalog_changed == 'true' ||
      needs.detect-changes.outputs.cart_changed == 'true' ||
      needs.detect-changes.outputs.auth_changed == 'true' ||
      needs.detect-changes.outputs.payment_changed == 'true'
    
    strategy:
      matrix:
        service: [ catalog-ms, cart-ms, auth-ms, payment-ms ]
        exclude:
          - service: cart-ms
            condition: ${{ needs.detect-changes.outputs.cart_changed != 'true' }}
          - service: auth-ms
            condition: ${{ needs.detect-changes.outputs.auth_changed != 'true' }}
          - service: payment-ms
            condition: ${{ needs.detect-changes.outputs.payment_changed != 'true' }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: packages/services/${{ matrix.service }}/package-lock.json
      
      - name: Install dependencies
        working-directory: packages/services/${{ matrix.service }}
        run: npm ci
      
      - name: Run ESLint
        working-directory: packages/services/${{ matrix.service }}
        run: npm run lint || true
      
      - name: Check formatting
        working-directory: packages/services/${{ matrix.service }}
        run: npm run format -- --check || true

  # =============================================
  # JOB 3: UNIT TESTS
  # =============================================
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: [ detect-changes, lint ]
    if: |
      needs.detect-changes.outputs.catalog_changed == 'true' ||
      needs.detect-changes.outputs.cart_changed == 'true' ||
      needs.detect-changes.outputs.auth_changed == 'true' ||
      needs.detect-changes.outputs.payment_changed == 'true'
    
    strategy:
      matrix:
        service: [ catalog-ms, cart-ms, auth-ms, payment-ms ]
        exclude:
          - service: cart-ms
            condition: ${{ needs.detect-changes.outputs.cart_changed != 'true' }}
          - service: auth-ms
            condition: ${{ needs.detect-changes.outputs.auth_changed != 'true' }}
          - service: payment-ms
            condition: ${{ needs.detect-changes.outputs.payment_changed != 'true' }}
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root123
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: packages/services/${{ matrix.service }}/package-lock.json
      
      - name: Install dependencies
        working-directory: packages/services/${{ matrix.service }}
        run: npm ci
      
      - name: Generate Prisma Client
        working-directory: packages/services/${{ matrix.service }}
        run: npm run prisma:generate
        env:
          DATABASE_URL: mysql://root:root123@localhost:3306/test_db
      
      - name: Run tests with coverage
        working-directory: packages/services/${{ matrix.service }}
        run: npm run test:coverage
        env:
          DATABASE_URL: mysql://root:root123@localhost:3306/test_db
          NODE_ENV: test
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: packages/services/${{ matrix.service }}/coverage
          retention-days: 7

  # =============================================
  # JOB 4: SONARQUBE ANALYSIS
  # =============================================
  sonarqube:
    name: 🔒 SonarQube Analysis
    runs-on: ubuntu-latest
    needs: [ test ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Importante para análise de histórico
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
        with:
          projectBaseDir: .
          args: >
            -Dsonar.projectKey=glamour-ecommerce
            -Dsonar.projectName="Glamour E-Commerce"
            -Dsonar.sources=packages
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.test.ts
            -Dsonar.javascript.lcov.reportPaths=packages/services/*/coverage/lcov.info
            -Dsonar.qualitygate.wait=true

  # =============================================
  # JOB 5: BUILD DOCKER IMAGES
  # =============================================
  build:
    name: 🐳 Build Docker Images
    runs-on: ubuntu-latest
    needs: [ test, sonarqube ]
    if: |
      (needs.detect-changes.outputs.catalog_changed == 'true' ||
       needs.detect-changes.outputs.cart_changed == 'true' ||
       needs.detect-changes.outputs.auth_changed == 'true' ||
       needs.detect-changes.outputs.payment_changed == 'true') &&
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'))
    
    strategy:
      matrix:
        service: [ catalog-ms, cart-ms, auth-ms, payment-ms ]
        exclude:
          - service: cart-ms
            condition: ${{ needs.detect-changes.outputs.cart_changed != 'true' }}
          - service: auth-ms
            condition: ${{ needs.detect-changes.outputs.auth_changed != 'true' }}
          - service: payment-ms
            condition: ${{ needs.detect-changes.outputs.payment_changed != 'true' }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: packages/services/${{ matrix.service }}
          file: packages/services/${{ matrix.service }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_VERSION=${{ env.NODE_VERSION }}
            SERVICE_NAME=${{ matrix.service }}

  # =============================================
  # JOB 6: DEPLOY (Simulação Local)
  # =============================================
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: [ build ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Create deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Built Images" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ secrets.DOCKER_USERNAME }}/glamour-catalog-ms:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ secrets.DOCKER_USERNAME }}/glamour-cart-ms:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ secrets.DOCKER_USERNAME }}/glamour-auth-ms:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ secrets.DOCKER_USERNAME }}/glamour-payment-ms:latest\`" >> $GITHUB_STEP_SUMMARY
      
      - name: Notify deployment success
        run: |
          echo "✅ All services built and pushed to Docker Hub successfully!"
          echo "Run 'docker-compose pull' on your server to update."