name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: 🧪 Testes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        working-directory: packages/services/catalog-ms
        run: npm install
        
      - name: Run tests
        working-directory: packages/services/catalog-ms
        run: npm test || echo "No tests yet"

  sonarqube:
    name: 🔒 SonarQube Analysis
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=glamour-ecommerce
            -Dsonar.sources=packages/services

  build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: sonarqube
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker image
        working-directory: packages/services/catalog-ms
        run: docker build -t glamour-catalog-ms:latest .
        
      - name: Save image
        run: docker save glamour-catalog-ms:latest | gzip > catalog-ms.tar.gz
        
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: catalog-ms.tar.gz

  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy simulation
        run: |
          echo "✅ Deploy simulado com sucesso!"
          echo "🚀 Imagem pronta para deploy no Docker Hub"
          echo "📦 Execute: docker-compose up -d"
