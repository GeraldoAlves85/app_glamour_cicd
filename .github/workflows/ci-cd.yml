name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  SONAR_ORG: geraldoalves85
  SONAR_PROJECT_KEY: geraldoalves85_app_glamour_cicd
  DOCKER_USERNAME: geraldoti2022
  DOCKER_IMAGE: geraldoti2022/glamour-botanica

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ env.SONAR_ORG }}
            -Dsonar.sources=.
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/backups/**,**/.github/**
            -Dsonar.qualitygate.wait=false

  deploy:
    name: Docker Build and Deploy
    runs-on: ubuntu-latest
    needs: sonarcloud
    if: always() && needs.sonarcloud.result != 'failure'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Dockerfile
        run: |
          cat > Dockerfile << 'DOCKERFILE'
          FROM nginx:alpine
          LABEL maintainer="geraldoti2022"
          LABEL description="Glamour Botanica"
          COPY glamour-botanica.html /usr/share/nginx/html/index.html
          EXPOSE 80
          DOCKERFILE

      - name: Build and Push Docker image
        run: |
          VERSION="v1.0.${{ github.run_number }}"
          echo "Building version: $VERSION"
          
          docker build -t ${{ env.DOCKER_IMAGE }}:$VERSION .
          docker tag ${{ env.DOCKER_IMAGE }}:$VERSION ${{ env.DOCKER_IMAGE }}:latest
          
          echo "Login to Docker Hub..."
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
          
          echo "Pushing images..."
          docker push ${{ env.DOCKER_IMAGE }}:$VERSION
          docker push ${{ env.DOCKER_IMAGE }}:latest
          
          echo ""
          echo "=========================================="
          echo "DEPLOY COMPLETED"
          echo "=========================================="
          echo "Version: $VERSION"
          echo "Image: ${{ env.DOCKER_IMAGE }}:$VERSION"
          echo "Image: ${{ env.DOCKER_IMAGE }}:latest"
          echo ""
          echo "Pull: docker pull ${{ env.DOCKER_IMAGE }}:latest"
          echo "Run:  docker run -d -p 80:80 ${{ env.DOCKER_IMAGE }}:latest"
          echo "=========================================="
