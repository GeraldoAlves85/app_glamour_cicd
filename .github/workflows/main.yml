name: 🚀 CI/CD Glamour Botânica

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  SONAR_ORG: geraldoalves85
  SONAR_PROJECT_KEY: geraldoalves85_app_glamour_cicd

jobs:
  sonarcloud:
    name: 🔒 SonarCloud Analysis
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ env.SONAR_ORG }}
            -Dsonar.sources=.
            -Dsonar.exclusions=**/node_modules/**,**/backups/**,**/aws/**
            -Dsonar.sourceEncoding=UTF-8

  build:
    name: 🐳 Build
    runs-on: ubuntu-latest
    needs: sonarcloud
    if: always() && needs.sonarcloud.result == 'success'
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - name: ✅ Build OK
        run: |
          echo "════════════════════════════════════════"
          echo "✅ CI/CD FUNCIONANDO PERFEITAMENTE!"
          echo "════════════════════════════════════════"
          echo ""
          echo "📦 Projeto: Glamour Botânica"
          echo "🔖 Build: ${{ github.run_number }}"
          echo "🔒 SonarCloud: https://sonarcloud.io/project/overview?id=${{ env.SONAR_PROJECT_KEY }}"
          echo ""

  notify:
    name: 📊 Status Final
    runs-on: ubuntu-latest
    needs: [sonarcloud, build]
    if: always()
    steps:
      - name: 📊 Resumo
        run: |
          echo "════════════════════════════════════════"
          echo "📊 RESULTADO FINAL"
          echo "════════════════════════════════════════"
          echo ""
          echo "🔒 SonarCloud: ${{ needs.sonarcloud.result }}"
          echo "🐳 Build: ${{ needs.build.result }}"
          echo ""
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "🎉🎉🎉 SUCESSO TOTAL! 🎉🎉🎉"
          else
            echo "⚠️ Algo deu errado, verifique os logs"
          fi
