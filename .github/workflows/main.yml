name: 🚀 CI/CD Glamour Botânica

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  SONAR_ORG: GeraldoAlves85
  SONAR_PROJECT_KEY: GeraldoAlves85_app_glamour_cicd

jobs:
  # =============================================
  # SONARCLOUD ANALYSIS
  # =============================================
  sonarcloud:
    name: 🔒 SonarCloud Analysis
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ env.SONAR_ORG }}
            -Dsonar.sources=.
            -Dsonar.exclusions=**/node_modules/**,**/backups/**,**/aws/**
            -Dsonar.sourceEncoding=UTF-8

  # =============================================
  # BUILD
  # =============================================
  build:
    name: 🐳 Build
    runs-on: ubuntu-latest
    needs: sonarcloud
    if: always() && needs.sonarcloud.result == 'success'
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🏗️ Build
        run: |
          echo "✅ Build concluído!"
          echo "📦 Projeto: Glamour Botânica"
          echo "🔖 Versão: ${{ github.run_number }}"
          echo ""
          echo "📁 Arquivos:"
          ls -la

  # =============================================
  # NOTIFY
  # =============================================
  notify:
    name: 📊 Status Final
    runs-on: ubuntu-latest
    needs: [sonarcloud, build]
    if: always()
    steps:
      - name: 📊 Resultado
        run: |
          echo "════════════════════════════════════════"
          echo "📊 RESULTADO DO CI/CD"
          echo "════════════════════════════════════════"
          echo ""
          echo "🔒 SonarCloud: ${{ needs.sonarcloud.result }}"
          echo "🐳 Build: ${{ needs.build.result }}"
          echo ""
          if [ "${{ needs.sonarcloud.result }}" == "success" ]; then
            echo "✅✅✅ PIPELINE CONCLUÍDA COM SUCESSO! ✅✅✅"
          else
            echo "❌ PIPELINE FALHOU!"
          fi
          echo ""
          echo "🔗 SonarCloud: https://sonarcloud.io/project/overview?id=${{ env.SONAR_PROJECT_KEY }}"
          echo "════════════════════════════════════════"
